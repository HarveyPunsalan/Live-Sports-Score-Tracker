<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <title>Live Sports</title>
</head>
<body>
<!-- HEADER -->
<header>
  <div class="logo">🏆 Sports Tracker</div>

    <!-- SEARCH BAR -->
    <div class="search-section">
      <input type="text" id="search-input" placeholder="Search a team..."/>
      <button id="search-btn">Search</button>
  </div>
</header>

<main>
  <!-- STATUS MESSAGE -->
  <p id="status-msg">Search for a team to get started!</p>

  <!-- TEAM PROFILE (hidden until search) -->
  <div id="team-profile" class="hidden">
    <img id="team-badge" src="" alt="team badge"/>
    <div class="team-info">
      <h2 id="team-name"></h2>
      <p id="team-sport"></p>
      <p id="team-country"></p>
      <p id="team-stadium"></p>
    </div>
  </div>

  <!-- RESULTS SECTION (hidden until search) -->
  <div id="results-section" class="hidden">

    <!-- LAST 5 RESULTS -->
    <div class="column">
      <h3>Last 5 Results</h3>
      <div id="last-results"></div>
    </div>

    <!-- UPCOMING MATCHES -->
    <div class="column">
      <h3>Upcoming Matches</h3>
      <div id="upcoming-matches"></div>
    </div>

  </div>

</main>
<script src="app.js"></script>
</body>
</html>
