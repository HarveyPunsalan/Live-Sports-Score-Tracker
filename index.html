<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Live Sports</title>
</head>
<body>
<!-- HEADER -->
<header>
  <div class="logo">🏆 Sports Tracker</div>
  <p class="tagline">Search any team in the world</p>

  <!-- SEARCH BAR -->
  <div class="search-section">
    <input type="text" id="search-input" placeholder="Search a team... e.g. Arsenal, Lakers"/>
    <button id="search-btn">Search</button>
  </div>
</header>

<main>
  <!-- STATUS MESSAGE -->
  <p id="status-msg">Search for a team to get started!</p>

  <!-- TEAM PROFILE (hidden until search) -->
  <div id="team-profile" class="hidden">
    <img id="team-badge" src="" alt="team badge"/>
    <div class="team-info">
      <h2 id="team-name"></h2>
      <p id="team-sport"></p>
      <p id="team-country"></p>
      <p id="team-stadium"></p>
    </div>
  </div>


</main>


</body>
</html>
